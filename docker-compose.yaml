services:
  miniredis:
    build: .
    container_name: miniredis
    ports:
      - "6379:6379"   # redis-compatible
      - "8080:8080"   # dashboard
    volumes:
      - ./data:/data
      - ./config.yaml:/config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc -q1 localhost 6379 | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3